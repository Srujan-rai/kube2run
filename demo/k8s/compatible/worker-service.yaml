# Compatible: event-driven worker, Pub/Sub hints, standard port, HPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
        - name: worker
          image: python:3.12-slim
          command: ["python", "-c", "import http.server; http.server.HTTPServer(('', 8080), http.server.BaseHTTPRequestHandler).serve_forever()"]
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
          env:
            - name: PUBSUB_TOPIC
              value: "projects/my-project/topics/orders"
            - name: PUBSUB_SUBSCRIPTION
              value: "projects/my-project/subscriptions/orders-sub"
            - name: APP_PORT
              value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
  namespace: default
spec:
  selector:
    app: worker-service
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP
      appProtocol: http
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: worker-service
  namespace: default
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: worker-service
  minReplicas: 0
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
